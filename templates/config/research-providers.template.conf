# Research skill provider configuration.
#
# The `/research` skill's capability-detection preamble reads this file to
# determine which provider tiers are enabled. Missing credentials silently
# disable a tier; this file can also force-disable a tier that has credentials
# available (e.g. to avoid burning Grok budget on simple queries).
#
# T1 (Tavily) is the primary retrieval tier. /research will refuse to run
# without it. T2/T3/T4 are optional and gracefully skipped when unavailable.

[T1:tavily]
enabled = true
env_key = TAVILY_API_KEY

[T2:gemini]
enabled = true
env_key = GEMINI_API_KEY
mcp_server = gemini

[T3:ollama]
enabled = true
mcp_server = ollama
# Model can be any Ollama-served model. qwen3:14b is a reasonable default for
# general QA. Projects with domain-specific needs should set the model that
# matches — e.g. llama3:70b for general reasoning, deepseek-coder for code.
default_model = qwen3:14b

[T4:grok]
enabled = false
env_key = GROK_API_KEY
