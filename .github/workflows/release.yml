name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: bash build_plugin.sh

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION)
          ZIP_FILE="project-bootstrap-v${VERSION}.zip"
          gh release create "${{ github.ref_name }}" "$ZIP_FILE" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
